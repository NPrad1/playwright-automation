name: Playwright Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      suite:
        description: 'TestNG suite file'
        required: false
        default: 'src/test/resources/testng.xml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ✅ FIX #7 — Install Playwright browsers before running tests
      #    Without this step, tests fail in CI with "Executable doesn't exist" error
      - name: Install Playwright Browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI \
             -D exec.args="install --with-deps"

      - name: Run Tests
        run: |
          mvn test \
            -Dheadless=true \
            -Dbrowser=${{ github.event.inputs.browser || 'chromium' }} \
            -DsuiteFile=${{ github.event.inputs.suite || 'src/test/resources/testng.xml' }}
        env:
          CI: true

      # ✅ Upload trace zips on failure — viewable in GitHub Actions artifacts
      - name: Upload Playwright Traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-output/traces/
          retention-days: 7

      # ✅ Upload failure videos
      - name: Upload Failure Videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos-${{ github.run_id }}
          path: test-output/videos/
          retention-days: 7

      # ✅ Upload Extent HTML report always
      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ github.run_id }}
          path: test-output/ExtentReport.html
          retention-days: 14

      # ✅ Upload Allure results for allure-report generation
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_id }}
          path: target/allure-results/
          retention-days: 14


