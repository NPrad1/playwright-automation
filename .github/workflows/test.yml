
name: Playwright Test Execution

on:
push:
branches: [ main ]

jobs:
test:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Set up Java
    uses: actions/setup-java@v3
    with:
      distribution: temurin
      java-version: 17

  - name: Run Tests
    working-directory: playwright-learn-automation
    run: mvn clean test
